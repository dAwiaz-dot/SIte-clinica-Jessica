<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Dra. Jessica Daniela, cirurgiã-dentista em Minas Gerais. Ortodontia, harmonização facial e facetas dentais em resina e porcelana. CRO-MG 072357.">
<title>Dra. Jessica Daniela | Odontologia Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #080808;
  --black2: #101010;
  --black3: #171717;
  --gold: #C9A655;
  --gold-light: #E4C477;
  --gold-dim: rgba(201, 166, 85, .14);
  --gold-border: rgba(201, 166, 85, .28);
  --white: #fff;
  --soft: #F5F0E8;
  --muted: #A2A2A2;
  --muted2: #707070;
  --green: #25D366;
}

html { scroll-behavior: smooth; }

body {
  font-family: "Jost", sans-serif;
  background: var(--black);
  color: var(--white);
  font-size: 16px;
  line-height: 1.7;
  overflow-x: hidden;
}

a { color: inherit; }

.whatsapp-float {
  position: fixed;
  right: 28px;
  bottom: 28px;
  z-index: 999;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  color: #fff;
  background: var(--green);
  border-radius: 999px;
  text-decoration: none;
  font-size: .86rem;
  font-weight: 600;
  letter-spacing: .4px;
  box-shadow: 0 12px 36px rgba(37, 211, 102, .36);
  transition: transform .2s, box-shadow .2s;
}

.whatsapp-float:hover {
  transform: translateY(-3px);
  box-shadow: 0 18px 44px rgba(37, 211, 102, .5);
}

nav {
  position: fixed;
  inset: 0 0 auto;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 2rem;
  padding: 1.05rem 6vw;
  background: rgba(8, 8, 8, .88);
  border-bottom: 1px solid var(--gold-border);
  backdrop-filter: blur(18px);
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: .9rem;
  text-decoration: none;
}

.brand-mark {
  width: 46px;
  height: 46px;
  display: grid;
  place-items: center;
  border: 1px solid var(--gold-border);
  color: var(--gold);
  font-family: "Cormorant Garamond", serif;
  font-size: 1.55rem;
  font-style: italic;
  font-weight: 600;
  line-height: 1;
}
